<!DOCTYPE html>
<html>
<head>
  <title>Customer Laundry Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
  <div class="card p-3 shadow">
    <h3 class="text-center">🧺 Laundry Status</h3>
    <div id="content">Loading...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// ✅ FIX 1: Use a different variable name (not "supabase")
// because the CDN already declares a global "supabase"
const supabaseClient = window.supabase.createClient(
  "https://lbynmptomywbkpukjxex.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxieW5tcHRvbXl3YmtwdWtqeGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA0MDg2ODUsImV4cCI6MjA3NTk4NDY4NX0.-O7JU8hjLYZSwTW7e9vfZz6n1klpf2pEPWYBgj3i5ZI"
);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function loadCustomer() {
  if (!id) {
    document.getElementById("content").innerHTML = "Invalid link";
    return;
  }

  // ✅ FIX 2: Use supabaseClient instead of supabase
  const { data, error } = await supabaseClient
    .from("customers")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    document.getElementById("content").innerHTML = "Customer not found";
    return;
  }

  // ✅ FIX 3: Added the missing backtick before <p>
  document.getElementById("content").innerHTML = `
    <p><b>Name:</b> ${data.name}</p>
    <p><b>Status:</b> ${data.status}</p>
    <p><b>Total Amount:</b> ₦${data.totalAmount}</p>
    <p><b>Remaining Items:</b> ${data.remaining}</p>
    <p><b>Description:</b> ${data.description}</p>
  `;
}

loadCustomer();
</script>

</body>
</html>
